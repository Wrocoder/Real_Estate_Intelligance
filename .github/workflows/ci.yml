name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check .

      - name: Pytest
        run: python -m pytest

      - name: Validate Alembic migrations
        env:
          DATABASE_URL: postgresql+psycopg://domarion:domarion@localhost:5432/domarion
        run: python -m alembic upgrade head --sql > /tmp/domarion-alembic.sql

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_OWNER_ID: demo-user
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Build
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t domarion-api:ci .

      - name: Build frontend image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL=http://127.0.0.1:8000 \
            --build-arg NEXT_PUBLIC_OWNER_ID=demo-user \
            --build-arg NEXT_PUBLIC_SITE_URL=http://127.0.0.1:3000 \
            -t domarion-frontend:ci \
            ./frontend
